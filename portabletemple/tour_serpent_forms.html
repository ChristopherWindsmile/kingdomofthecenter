  map.on('click', function() {
    var panel = document.getElementById('panel');
    if (panel.style.display === 'flex') closePanel();
  });

  const imageUrl = "images/landing-giga.png";
  const img = new Image();
  img.onload = function() {
    const bounds = [[0, 0], [img.height, img.width]];
    L.imageOverlay(imageUrl, bounds).addTo(map);

    const markerPositions = [];
    motifs.forEach(function(motif) {
      const marker = L.marker([motif.lat, motif.lng]).addTo(map);
      marker.bindTooltip(
        '<b>' + motif.label + '</b><br><span style="font-size:11px;opacity:0.8">' + motif.subtitle + '</span>',
        { direction: 'top', offset: [0, -8], className: 'custom-tooltip' }
      );
      marker.on('click', function() {
        if (isTourActive) {
          isTourActive = false;
          document.getElementById('tour-forks').style.display = 'none';
          document.getElementById('start-tour').style.display = 'flex';
        }
        showPanel(motif, false);
      });
      markerPositions.push([motif.lat, motif.lng]);
    });

    function fitView() {
      map.invalidateSize();
      if (markerPositions.length > 0) {
        map.fitBounds(L.latLngBounds(markerPositions), { padding: [140, 160] });
      } else {
        map.fitBounds(bounds, { padding: [60, 60] });
      }
    }
    fitView();

    let hadNoSize = map.getSize().x === 0 || map.getSize().y === 0;
    new ResizeObserver(function() {
      map.invalidateSize();
      const s = map.getSize();
      if (hadNoSize && s.x > 0 && s.y > 0) { fitView(); hadNoSize = false; }
    }).observe(document.getElementById('map'));
  };
  img.src = imageUrl;
}

function loadLearnMore() {
  fetch('data/learn-more.json')
    .then(function(res) { return res.ok ? res.json() : {}; })
    .then(function(json) { LEARN_MORE_STEPS = json || {}; })
    .catch(function(e) { console.warn('Learn More data not loaded:', e); });
}

function showPanel(motif, isTourMode) {
  document.getElementById('panel-image').src = motif.image;
  document.getElementById('panel-title').innerHTML =
    motif.label + ' <span style="font-size:13px; font-weight:400; color:#8a7f68; display:block; margin-top:2px;">' + motif.subtitle + '</span>';
  document.getElementById('panel-text').textContent = motif.text;
  document.getElementById('panel-scroll').scrollTop = 0;

  renderActions(motif);

  const panel = document.getElementById('panel');
  const forksEl = document.getElementById('tour-forks');
  panel.style.display = 'flex';

  if (isTourMode) {
    forksEl.style.display = 'flex';
    renderForks(motif);
  } else {
    forksEl.style.display = 'none';
  }
}

function renderActions(motif) {
  const actionsEl = document.getElementById('panel-actions');
  const ddRow = document.getElementById('row-deepdive');
  const ddLabel = document.getElementById('label-deepdive');
  const ddBtn = document.getElementById('action-deepdive');
  const lmRow = document.getElementById('row-learnmore');
  const lmLabel = document.getElementById('label-learnmore');
  const lmBtn = document.getElementById('action-learnmore');

  if (motif.deepdiveUrl) {
    ddRow.style.display = 'flex';
    ddLabel.textContent = motif.deepdiveTitle || 'Deep Dive';
    ddBtn.onclick = function() { openDeepDive(motif.deepdiveUrl, motif.deepdiveTitle || motif.label); };
  } else {
    ddRow.style.display = 'none';
  }

  const hasLearnMore = motif.learnMoreId && LEARN_MORE_STEPS[motif.learnMoreId] && LEARN_MORE_STEPS[motif.learnMoreId].length;
  if (hasLearnMore) {
    lmRow.style.display = 'flex';
    lmLabel.textContent = motif.label;
    lmBtn.onclick = function() { openLearnMore(motif.learnMoreId, motif.label); };
  } else {
    lmRow.style.display = 'none';
  }

  // Container (including its divider line) only shows up when it has something in it.
  actionsEl.style.display = (motif.deepdiveUrl || hasLearnMore) ? 'flex' : 'none';
}

function closePanel() {
  document.getElementById('panel').style.display = 'none';
  isTourActive = false;
  document.getElementById('tour-forks').style.display = 'none';
  document.getElementById('start-tour').style.display = 'flex';
}

function startGuidedTour() {
  tourHistory = [];
  isTourActive = true;
  document.getElementById('start-tour').style.display = 'none';
  goToNode('crossroads', true);
}

function goToNode(id, pushHistory) {
  if (id === '__end__') { closePanel(); return; }
  const node = nodeById(id);
  if (!node) return;
  if (pushHistory) tourHistory.push(id);
  currentNodeId = id;
  showPanel(node, true);
  flyToNode(node);
}

function goBack() {
  if (tourHistory.length <= 1) return;
  tourHistory.pop();
  const prevId = tourHistory[tourHistory.length - 1];
  currentNodeId = prevId;
  const node = nodeById(prevId);
  showPanel(node, true);
  flyToNode(node);
}

function flyToNode(motif) {
  const target = L.latLng(motif.lat, motif.lng);
  const zoomLvl = 2.8;
  if (window.matchMedia('(max-width: 700px)').matches) {
    const pt = map.project(target, zoomLvl);
    pt.y += map.getSize().y * 0.26;
    map.flyTo(map.unproject(pt, zoomLvl), zoomLvl, { duration: 2.2, easeLinearity: 0.25 });
  } else {
    map.flyTo(target, zoomLvl, { duration: 2.2, easeLinearity: 0.25 });
  }
}

function renderForks(motif) {
  // Counter is each marker's fixed position in this tour's own motifs array --
  // not how the visitor got here. Forking or wandering off and back doesn't
  // change it: "stop 3 of 5 markers on this tour", full stop.
  const idx = motifs.indexOf(motif);
  document.getElementById('tour-counter').textContent = (idx + 1) + ' / ' + motifs.length;

  document.getElementById('tour-back-btn').classList.toggle('hidden', tourHistory.length <= 1);

  const row = document.getElementById('tour-buttons-row');
  row.querySelectorAll('.fork-btn').forEach(function(el) { el.remove(); });

  (motif.forks || []).forEach(function(fork) {
    let el;
    if (fork.href) {
      el = document.createElement('a');
      el.href = fork.href;
    } else {
      el = document.createElement('button');
      el.onclick = function() { goToNode(fork.target, true); };
    }
    el.className = 'fork-btn' + (fork.choice ? ' choice' : '');
    el.textContent = fork.label;
    row.appendChild(el);
  });
}

// === DEEP DIVE (iframe-in-a-panel) ===
function openDeepDive(url, title) {
  document.getElementById('deepdive-title').textContent = title || 'Deep Dive';
  document.getElementById('deepdive-iframe').src = url;
  document.getElementById('deepdive-overlay').classList.add('open');
}
function closeDeepDive(e) {
  if (e && e.target !== document.getElementById('deepdive-overlay')) return;
  document.getElementById('deepdive-overlay').classList.remove('open');
  document.getElementById('deepdive-iframe').src = 'about:blank';
}

// === LEARN MORE (ported from timeline-pt.html: same ids, same data flow) ===
function openLearnMore(stepsId, title) {
  const steps = LEARN_MORE_STEPS[stepsId];
  if (!steps || !steps.length) return;
  lmSteps = steps;
  lmIndex = 0;
  document.getElementById('learnmore-title').textContent = title || 'Learn More';
  document.getElementById('learnmore-overlay').classList.add('open');
  lmRenderSlide();
}
function closeLearnMore(e) {
  if (e && e.target !== document.getElementById('learnmore-overlay')) return;
  document.getElementById('learnmore-overlay').classList.remove('open');
}
function lmRenderSlide() {
  const step = lmSteps[lmIndex];
  const img = document.getElementById('learnmore-img');
  img.classList.add('fade');
  setTimeout(function() {
    img.src = step.image;
    img.alt = step.label;
    img.onload = function() { img.classList.remove('fade'); };
    img.onerror = function() { img.classList.remove('fade'); };
  }, 250);
  document.getElementById('learnmore-caption-label').textContent = step.label;
  document.getElementById('learnmore-caption-text').textContent = step.caption;
  document.getElementById('learnmore-counter').textContent = (lmIndex + 1) + ' / ' + lmSteps.length;
  document.getElementById('lm-prev').disabled = (lmIndex === 0);
  document.getElementById('lm-next').disabled = (lmIndex === lmSteps.length - 1);
  const dotsEl = document.getElementById('learnmore-step-dots');
  dotsEl.innerHTML = '';
  lmSteps.forEach(function(_, i) {
    const dot = document.createElement('span');
    dot.className = 'lm-dot' + (i === lmIndex ? ' active' : '');
    dot.onclick = (function(idx) { return function() { lmIndex = idx; lmRenderSlide(); }; })(i);
    dotsEl.appendChild(dot);
  });
}
function lmChangeSlide(delta) {
  const next = lmIndex + delta;
  if (next >= 0 && next < lmSteps.length) {
    lmIndex = next;
    lmRenderSlide();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const ddOverlay = document.getElementById('deepdive-overlay');
    const lmOverlay = document.getElementById('learnmore-overlay');
    if (ddOverlay.classList.contains('open')) {
      closeDeepDive();
    } else if (lmOverlay.classList.contains('open')) {
      closeLearnMore();
    } else {
      const panel = document.getElementById('panel');
      if (panel.style.display === 'flex') {
        closePanel();
      } else if (window.parent !== window) {
        window.parent.postMessage('close-story', '*');
      }
    }
  }
  if (e.key.toLowerCase() === 't' && document.getElementById('panel').style.display !== 'flex') {
    startGuidedTour();
  }
});

document.getElementById('panel-image').addEventListener('click', function() {
  document.getElementById('img-lightbox-img').src = this.src;
  document.getElementById('img-lightbox').classList.add('open');
});

window.onload = function() {
  initMap();
  loadLearnMore();
};
</script>
</body>
