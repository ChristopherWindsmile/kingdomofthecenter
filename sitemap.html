

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitemap — Kingdom of the Center</title>
  <style>
    :root {
      --ink:       #1a1814;
      --ink-mid:   #4a4640;
      --ink-faint: #8a8480;
      --rule:      rgba(26,24,20,0.12);
      --bg:        #f5f2eb;
      --bg-panel:  #eeeadf;
      --accent:    #7a4a20;
      --accent-lt: #c8916a;
      --mono:      'Courier New', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink:       #e8e4d8;
        --ink-mid:   #a09890;
        --ink-faint: #686460;
        --rule:      rgba(232,228,216,0.1);
        --bg:        #1a1814;
        --bg-panel:  #201e1a;
        --accent:    #c8916a;
        --accent-lt: #a06840;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Palatino Linotype', serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 4rem 2rem 6rem;
    }

    .page-shell {
      max-width: 760px;
      margin: 0 auto;
    }

    .site-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    .generated-note {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-faint);
      margin-top: 0.3rem;
      min-height: 1.2em;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.4rem 0;
    }

    /* Cache bar */
    .cache-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.9rem;
      background: var(--bg-panel);
      border: 1px solid var(--rule);
      border-radius: 4px;
      margin-bottom: 2.4rem;
    }

    .cache-status {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
    }

    .cache-status .label {
      color: var(--accent-lt);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-right: 0.5rem;
    }

    .refresh-btn {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-faint);
      padding: 0.25rem 0.7rem;
      cursor: pointer;
      border-radius: 3px;
      transition: color 0.15s, border-color 0.15s;
    }
    .refresh-btn:hover { color: var(--accent); border-color: var(--accent-lt); }

    .count-badge {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--ink-faint);
    }

    /* Folder tree */
    .folder-block {
      margin-bottom: 2.2rem;
    }

    .folder-heading {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 0.45rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 0.2rem;
    }

    .folder-heading .folder-icon {
      margin-right: 0.45em;
      opacity: 0.6;
    }

    .page-list {
      list-style: none;
      padding-left: 1.2rem;
      border-left: 1px solid var(--rule);
      margin-left: 0.35rem;
    }

    .page-item {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .page-item:last-child { border-bottom: none; }

    .page-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-lt);
      flex-shrink: 0;
      margin-top: 0.5em;
    }

    .page-link {
      flex: 1;
      font-size: 1rem;
      color: var(--ink);
      text-decoration: none;
      transition: color 0.15s;
    }
    .page-link:hover { color: var(--accent); }

    .page-filename {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--ink-faint);
      margin-top: 0.1rem;
    }

    .page-date {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--ink-faint);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .state-msg {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--ink-faint);
      padding: 2rem 0;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
<div class="page-shell">

  <p class="site-label">Kingdom of the Center &nbsp;/&nbsp; Christopher Windsmile</p>
  <h1>Sitemap</h1>
  <p class="generated-note" id="gen-note">Loading&hellip;</p>

  <hr class="divider">

  <div class="cache-bar">
    <span class="cache-status">
      <span class="label" id="cache-label">—</span>
      <span id="cache-detail"></span>
    </span>
    <span style="display:flex;align-items:center;gap:1rem">
      <span class="count-badge" id="total-count"></span>
      <button class="refresh-btn" onclick="forceRefresh()">↺ Refresh</button>
    </span>
  </div>

  <div id="content-area">
    <p class="state-msg">Fetching manifest&hellip;</p>
  </div>

</div>

<script>
  const CACHE_KEY = 'kotc_sitemap_v2';
  const CACHE_TTL = 24 * 60 * 60 * 1000;
  const MANIFEST  = 'pages-manifest.json';

  async function init() {
    let data = null;
    let source = null;

    const cached = readCache();
    if (cached) {
      data   = cached;
      source = 'cache';
    } else {
      try {
        const res = await fetch(MANIFEST + '?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
        writeCache(data);
        source = 'network';
      } catch (err) {
        showError(err);
        return;
      }
    }

    renderAll(data, source);
  }

  function readCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const { timestamp, data } = JSON.parse(raw);
      if (Date.now() - timestamp > CACHE_TTL) return null;
      return data;
    } catch { return null; }
  }

  function writeCache(data) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data }));
    } catch {}
  }

  function forceRefresh() {
    try { localStorage.removeItem(CACHE_KEY); } catch {}
    document.getElementById('content-area').innerHTML =
      '<p class="state-msg">Refreshing&hellip;</p>';
    init();
  }

  function renderAll(data, source) {
    const pages = data.pages || [];

    // Filter out any page whose path contains a drafts_ segment
    const publicPages = pages.filter(p => {
      const parts = p.path.split('/');
      return !parts.some(seg => seg === 'drafts' || seg.startsWith('drafts_'));
    });

    document.getElementById('gen-note').textContent =
      data.generated ? 'Index as of ' + data.generated : '';

    document.getElementById('cache-label').textContent =
      source === 'cache' ? 'Cached' : 'Live';
    document.getElementById('cache-detail').textContent =
      source === 'cache'
        ? '(refreshes automatically every 24 h)'
        : 'fetched from manifest';
    document.getElementById('total-count').textContent =
      publicPages.length + ' page' + (publicPages.length !== 1 ? 's' : '');

    // Group pages by their immediate parent folder
    const folders = {};
    publicPages.forEach(p => {
      const parts = p.path.split('/');
      const folder = parts.length > 1 ? parts.slice(0, -1).join('/') : '(root)';
      if (!folders[folder]) folders[folder] = [];
      folders[folder].push(p);
    });

    // Sort folders: root first, then alphabetically
    const folderNames = Object.keys(folders).sort((a, b) => {
      if (a === '(root)') return -1;
      if (b === '(root)') return 1;
      return a.localeCompare(b);
    });

    const area = document.getElementById('content-area');
    area.innerHTML = '';

    // Debug: show what we got if nothing to render
    if (folderNames.length === 0) {
      area.innerHTML = `<p class="state-msg">
        No public pages found.<br><br>
        Raw page count from manifest: ${pages.length}<br>
        After drafts_ filter: ${publicPages.length}<br>
        ${pages.length > 0 && publicPages.length === 0
          ? '⚠ All pages are inside drafts_ folders — check your folder naming.'
          : pages.length === 0
            ? '⚠ pages-manifest.json exists but has no entries in the "pages" array.'
            : ''}
      </p>`;
      return;
    }

    folderNames.forEach(folder => {
      const block = document.createElement('div');
      block.className = 'folder-block';

      const heading = document.createElement('div');
      heading.className = 'folder-heading';
      heading.innerHTML =
        '<span class="folder-icon">&#128193;</span>' + escHtml(folder);
      block.appendChild(heading);

      const ul = document.createElement('ul');
      ul.className = 'page-list';

      folders[folder].forEach(p => {
        const filename = p.path.split('/').pop();
        const href = p.path.replace(/^\//, '');
        const date = p.updated || '—';

        const li = document.createElement('li');
        li.className = 'page-item';
        li.innerHTML = `
          <span class="page-dot" aria-hidden="true"></span>
          <span style="flex:1;min-width:0">
            <a class="page-link" href="${href}" target="_top">${escHtml(p.title)}</a>
            <div class="page-filename">${escHtml(filename)}</div>
          </span>
          <span class="page-date">${date}</span>`;
        ul.appendChild(li);
      });

      block.appendChild(ul);
      area.appendChild(block);
    });
  }

  function showError(err) {
    document.getElementById('gen-note').textContent = '';
    document.getElementById('cache-label').textContent = 'Error';
    document.getElementById('cache-detail').textContent = err.message;
    document.getElementById('content-area').innerHTML =
      '<p class="state-msg">Could not load pages-manifest.json. ' +
      'Run the GitHub Action to generate it, or check the path.</p>';
  }

  function escHtml(str) {
    return (str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
